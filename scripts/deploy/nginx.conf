# ============================================
# 文澜智作 - Nginx 配置文件
# ============================================
# 使用方式:
# 1. 将此文件复制到 /etc/nginx/sites-available/wenlan
# 2. 修改 server_name 为你的域名
# 3. 运行: sudo ln -s /etc/nginx/sites-available/wenlan /etc/nginx/sites-enabled/
# 4. 运行: sudo nginx -t
# 5. 运行: sudo systemctl reload nginx
# ============================================

server {
    listen 80;
    server_name YOUR_DOMAIN;  # 修改为你的域名

    # 日志
    access_log /var/log/nginx/wenlan_access.log;
    error_log /var/log/nginx/wenlan_error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

